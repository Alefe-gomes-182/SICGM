name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Verify required files
        run: |
          echo "📁 Verificando arquivos necessários..."
          if [ ! -f "index.html" ]; then
            echo "❌ ERRO: index.html não encontrado!"
            exit 1
          fi
          echo "✅ index.html encontrado"
          
          if [ ! -d "css" ]; then
            echo "⚠️ Aviso: Pasta 'css' não encontrada"
          else
            echo "✅ Pasta 'css' encontrada"
          fi
          
          if [ ! -d "js" ]; then
            echo "⚠️ Aviso: Pasta 'js' não encontrada"
          else
            echo "✅ Pasta 'js' encontrada"
          fi
          
          echo "📁 Conteúdo do diretório:"
          ls -la
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: github-pages

  # Job de deploy (depende do build)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pagesname: Deploy to GitHub Pages

